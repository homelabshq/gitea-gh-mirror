version: "3.8"

services:
  server:
    image: gitea/gitea:1.26.2-rootless@sha256:c5c21a7705a16f2b2369384a3b7d67c5ed761a818bbb0a55187b5cf98cdc2e68
    user: "1000:1000"
    restart: on-failure
    ports:
      - "8085:8085"
      - "2222:2222"
    volumes:
      - ./data/gitea/data:/var/lib/gitea
      - ./data/gitea/config:/etc/gitea
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__HTTP_PORT: "8085"
      GITEA__server__SSH_PORT: "2222"
      GITEA__server__SSH_LISTEN_PORT: "2222"
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__database__DB_TYPE: "mysql"
      GITEA__database__HOST: "gitea-gh-mirror-db-1:3306"
      GITEA__database__NAME: "gitea"
      GITEA__database__USER: "gitea"
      GITEA__database__PASSWD: "14B3C9B53A17A797"

  db:
    image: mariadb:11.2.4@sha256:e9ea1dbab6783ff0281e41e3357d950a5f598b2033559b8443e03b181807910b
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ./data/db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "gitea"
      MYSQL_USER: "gitea"
      MYSQL_PASSWORD: "14B3C9B53A17A797"
      MYSQL_DATABASE: "gitea"

  gitea-mirror:
    image: ghcr.io/raylabshq/gitea-mirror:latest
    container_name: gitea-mirror
    restart: on-failure
    ports:
      - "4321:4321"
    user: 1000:1000
    volumes:
      - ./data:/app/data
    environment:
      - BETTER_AUTH_SECRET="8D39D2A4C2D41685F6CD1BB9B397815EF311E1FCF6A879B0DFD42530646CFF72" # Min 32 chars, required for sessions
      - BETTER_AUTH_URL=http://0.0.0.0:4321
      - BETTER_AUTH_TRUSTED_ORIGINS=http://0.0.0.0:4321
      - NODE_ENV=production
      - DATABASE_URL=file:data/gitea-mirror.db
      - HOST=0.0.0.0
      - PORT=4321
      - BASE_URL=${BASE_URL:-/}
      - PUBLIC_BETTER_AUTH_URL=http://0.0.0.0:4321
      - MIRROR_ISSUE_CONCURRENCY=3
      - MIRROR_PULL_REQUEST_CONCURRENCY=5
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=3",
          "--spider",
          "http://0.0.0.0:4321/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
