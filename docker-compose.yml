services:
  init-permissions:
    image: alpine:3.22.4@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    user: "0:0"
    restart: "no"
    command: >
      sh -c "mkdir -p /data/gitea/data /data/gitea/config /data/db /data/gitea-mirror && chown -R 1000:1000 /data"
    volumes:
      - ./data:/data:z

  server:
    image: gitea/gitea:1.26.2-rootless@sha256:c5c21a7705a16f2b2369384a3b7d67c5ed761a818bbb0a55187b5cf98cdc2e68
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    ports:
      - "8085:8085"
      - "2222:2222"
    volumes:
      - ./data/gitea/data:/var/lib/gitea:z
      - ./data/gitea/config:/etc/gitea:z
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__HTTP_PORT: "8085"
      GITEA__server__SSH_PORT: "2222"
      GITEA__server__SSH_LISTEN_PORT: "2222"
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__database__DB_TYPE: "mysql"
      GITEA__database__HOST: "db:3306"
      GITEA__database__NAME: "gitea"
      GITEA__database__USER: "gitea"
      GITEA__database__PASSWD: "14B3C9B53A17A797"

  db:
    image: mariadb:12.2.2@sha256:6a4c4bbf0447c2247801309513fcc0dd17c3f35390368139ce419387fdd1144d
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    volumes:
      - ./data/db:/var/lib/mysql:z
    environment:
      MYSQL_ROOT_PASSWORD: "gitea"
      MYSQL_USER: "gitea"
      MYSQL_PASSWORD: "14B3C9B53A17A797"
      MYSQL_DATABASE: "gitea"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gitea-mirror:
    image: ghcr.io/raylabshq/gitea-mirror:v3.16.3@sha256:b4d9bcfb6fdd898ad4aa2e640b07b9cf27a9fb88eec980371d24d25422353e3a
    container_name: gitea-mirror
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    ports:
      - "4321:4321"
    user: 1000:1000
    volumes:
      - ./data/gitea-mirror:/app/data:z
    environment:
      BETTER_AUTH_SECRET: "8D39D2A4C2D41685F6CD1BB9B397815EF311E1FCF6A879B0DFD42530646CFF72" # Min 32 chars, required for sessions
      BETTER_AUTH_URL: http://0.0.0.0:4321
      BETTER_AUTH_TRUSTED_ORIGINS: http://0.0.0.0:4321
      NODE_ENV: production
      DATABASE_URL: file:data/gitea-mirror.db
      HOST: 0.0.0.0
      PORT: 4321
      BASE_URL: ${BASE_URL:-/}
      PUBLIC_BETTER_AUTH_URL: http://0.0.0.0:4321
      MIRROR_ISSUE_CONCURRENCY: 3
      MIRROR_PULL_REQUEST_CONCURRENCY: 5
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=3",
          "--spider",
          "http://0.0.0.0:4321/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
